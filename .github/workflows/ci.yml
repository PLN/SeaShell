name: Release

on:
  push:
    tags: ['v*']

# ── Job 1: Build ────────────────────────────────────────────────────────
# Compile on both platforms, produce platform-specific binaries.

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-musl-x64
            container: mcr.microsoft.com/dotnet/sdk:10.0-alpine
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        if: ${{ !matrix.container }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build -c Release

      - name: Publish CLI + Daemon + Elevator
        run: |
          dotnet publish src/SeaShell.Cli/SeaShell.Cli.csproj -c Release -r ${{ matrix.rid }} --self-contained false -o ./publish/${{ matrix.rid }}
          dotnet publish src/SeaShell.Daemon/SeaShell.Daemon.csproj -c Release -r ${{ matrix.rid }} --self-contained false -o ./publish/${{ matrix.rid }}
          dotnet publish src/SeaShell.Elevator/SeaShell.Elevator.csproj -c Release -r ${{ matrix.rid }} --self-contained false -o ./publish/${{ matrix.rid }}

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/

  # ── Job 2: Release ───────────────────────────────────────────────────
  # Pack, validate, publish to nuget.org, create GitHub Release.

  release:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write       # create GitHub releases
      id-token: write       # OIDC token for Sigstore signing
      attestations: write   # upload attestation to GitHub API

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-win-x64
          path: publish/win-x64/

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-x64
          path: publish/linux-x64/

      - name: Download Alpine binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-musl-x64
          path: publish/linux-musl-x64/

      # Build Daemon separately — nothing in the packable projects references it,
      # but we need its bin/Release output for the Service package's shared DLLs.
      - name: Build Daemon (for shared DLLs)
        run: dotnet build src/SeaShell.Daemon/SeaShell.Daemon.csproj -c Release

      - name: Pack CLI + Host
        run: dotnet pack -c Release -o ./nupkg

      # Service package: platform binaries from build jobs + shared DLLs from Daemon build.
      # PublishDir and BuildDir default to paths relative to pkg/SeaShell.Binaries.csproj
      # that match our download layout (publish/{rid}/) and build output.
      - name: Pack Service
        run: dotnet pack pkg/SeaShell.Binaries.csproj -c Release -o ./nupkg

      # Inject SeaShell.Service dependency into CLI and Host nuspecs post-pack.
      # Can't be a .csproj dependency (chicken-and-egg: Service is built from same repo).
      - name: Inject Service dependency
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $serviceVersion = (Get-ChildItem nupkg/SeaShell.Service.*.nupkg).BaseName -replace '^SeaShell\.Service\.',''
          Write-Host "Service version: $serviceVersion"

          foreach ($pattern in @('SeaShell.0.*.nupkg', 'SeaShell.Host.*.nupkg')) {
            $pkg = (Get-ChildItem "nupkg/$pattern" -ErrorAction SilentlyContinue).FullName
            if (-not $pkg) { continue }
            Write-Host "Injecting into $(Split-Path $pkg -Leaf)"

            $zip = [System.IO.Compression.ZipFile]::Open($pkg, 'Update')
            try {
              $nuspec = $zip.Entries | Where-Object { $_.FullName -like '*.nuspec' } | Select-Object -First 1
              $reader = [System.IO.StreamReader]::new($nuspec.Open())
              $xml = [xml]$reader.ReadToEnd()
              $reader.Close()

              $ns = $xml.DocumentElement.NamespaceURI
              $deps = $xml.SelectSingleNode('//*[local-name()="dependencies"]')
              if (-not $deps) {
                $deps = $xml.CreateElement('dependencies', $ns)
                $xml.SelectSingleNode('//*[local-name()="metadata"]').AppendChild($deps) | Out-Null
              }

              $group = $deps.SelectSingleNode('*[local-name()="group" and contains(@targetFramework,"net10.0")]')
              if (-not $group) {
                $group = $xml.CreateElement('group', $ns)
                $group.SetAttribute('targetFramework', 'net10.0')
                $deps.AppendChild($group) | Out-Null
              }

              $dep = $xml.CreateElement('dependency', $ns)
              $dep.SetAttribute('id', 'SeaShell.Service')
              $dep.SetAttribute('version', "[$serviceVersion]")
              $dep.SetAttribute('exclude', 'Build,Analyzers')
              $group.AppendChild($dep) | Out-Null

              $nuspec.Delete()
              $newEntry = $zip.CreateEntry($nuspec.FullName)
              $writer = [System.IO.StreamWriter]::new($newEntry.Open())
              $xml.Save($writer)
              $writer.Close()
              Write-Host "  OK: SeaShell.Service [$serviceVersion]"
            }
            finally { $zip.Dispose() }
          }

      - name: Validate package contents
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $failed = $false

          function Assert-Contains($nupkg, $expected) {
            $zip = [System.IO.Compression.ZipFile]::OpenRead($nupkg)
            $entries = $zip.Entries | ForEach-Object { $_.FullName }
            $zip.Dispose()
            foreach ($e in $expected) {
              if ($entries -contains $e) {
                Write-Host "  OK: $e"
              } else {
                Write-Host "  MISSING: $e" -ForegroundColor Red
                $script:failed = $true
              }
            }
          }

          function Assert-NuspecHas($nupkg, $text) {
            $zip = [System.IO.Compression.ZipFile]::OpenRead($nupkg)
            $nuspec = $zip.Entries | Where-Object { $_.FullName -like '*.nuspec' } | Select-Object -First 1
            $reader = [System.IO.StreamReader]::new($nuspec.Open())
            $content = $reader.ReadToEnd()
            $reader.Close()
            $zip.Dispose()
            if ($content -match $text) { Write-Host "  OK: $text dependency" }
            else { Write-Host "  MISSING: $text dependency" -ForegroundColor Red; $script:failed = $true }
          }

          Write-Host "=== SeaShell (tool) ==="
          $pkg = (Get-ChildItem nupkg/SeaShell.0.*.nupkg).FullName
          Assert-Contains $pkg @(
            'tools/net10.0/any/sea.dll',
            'tools/net10.0/any/SeaShell.Invoker.dll',
            'tools/net10.0/any/SeaShell.Protocol.dll',
            'tools/net10.0/any/SeaShell.Common.dll',
            'tools/net10.0/any/MessagePack.dll'
          )
          Assert-NuspecHas $pkg 'SeaShell.Service'

          Write-Host "`n=== SeaShell.Host ==="
          $pkg = (Get-ChildItem nupkg/SeaShell.Host.*.nupkg).FullName
          Assert-Contains $pkg @(
            'lib/net10.0/SeaShell.Host.dll',
            'build/net10.0/SeaShell.Host.targets',
            'build/net10.0/SeaShell.Script.dll',
            'build/net10.0/SeaShell.Common.dll',
            'build/net10.0/MessagePack.dll',
            'buildTransitive/net10.0/SeaShell.Host.targets'
          )
          Assert-NuspecHas $pkg 'SeaShell.Service'

          Write-Host "`n=== SeaShell.Service ==="
          $pkg = (Get-ChildItem nupkg/SeaShell.Service.*.nupkg).FullName
          Assert-Contains $pkg @(
            'runtimes/win-x64/seashell-daemon.exe',
            'runtimes/win-x64/seashell-elevator.exe',
            'runtimes/linux-x64/seashell-daemon',
            'runtimes/linux-x64/seashell-elevator',
            'runtimes/linux-musl-x64/seashell-daemon',
            'runtimes/linux-musl-x64/seashell-elevator',
            'runtimes/any/SeaShell.Engine.dll',
            'runtimes/any/SeaShell.Common.dll'
          )

          # Verify exactly 3 packages (no stale Engine/Common/ServiceHost/Ipc packages)
          $count = (Get-ChildItem nupkg/*.nupkg).Count
          if ($count -ne 3) {
            Write-Host "Expected 3 packages, found $count" -ForegroundColor Red
            Get-ChildItem nupkg/*.nupkg | ForEach-Object { Write-Host "  $_" }
            $failed = $true
          }

          if ($failed) {
            Write-Host "`nPackage validation FAILED" -ForegroundColor Red
            exit 1
          }
          Write-Host "`nAll packages validated OK ($count packages)" -ForegroundColor Green

      - name: Attest NuGet packages
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'nupkg/*.nupkg'

      - name: Push to nuget.org
        if: ${{ !contains(github.ref_name, '-') }}
        shell: pwsh
        run: |
          foreach ($pkg in Get-ChildItem nupkg/*.nupkg) {
            Write-Host "Pushing $($pkg.Name)"
            dotnet nuget push $pkg.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Creating release for $TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            nupkg/*.nupkg
