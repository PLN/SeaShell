name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Build
        run: dotnet build -c Release

      - name: Pack
        run: dotnet pack -c Release -o ./nupkg

      - name: Publish (win-x64)
        if: runner.os == 'Windows'
        run: dotnet publish src/SeaShell.Cli/SeaShell.Cli.csproj -c Release -r win-x64 --self-contained false -o ./publish/win-x64

      - name: Publish (linux-x64)
        if: runner.os == 'Linux'
        run: dotnet publish src/SeaShell.Cli/SeaShell.Cli.csproj -c Release -r linux-x64 --self-contained false -o ./publish/linux-x64

      # Smoke tests — exercise the full pipeline: daemon, compiler, pipe, script
      - name: Smoke test — hello.cs
        run: dotnet run --project src/SeaShell.Cli -- test/hello.cs

      - name: Smoke test — sea_context_test.cs
        run: dotnet run --project src/SeaShell.Cli -- test/sea_context_test.cs

      - name: Smoke test — interactive_ok.cs
        run: dotnet run --project src/SeaShell.Cli -- test/interactive_ok.cs

      # Lifecycle tests — daemon start/stop/status
      # ── Service smoke test ─────────────────────────────────────────────
      # Exercises all three new features: binary running, RequestReload, ServiceHost.
      # Publishes SmokeApp as a single-file exe, runs it via ServiceHost as a
      # platform service, verifies the reload cycle, then stops and uninstalls.

      - name: Service smoke — publish SmokeApp (single-file)
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            RID=win-x64
          else
            RID=linux-x64
          fi
          dotnet publish test/SmokeApp -r $RID -p:PublishSingleFile=true -o test/smoke-publish/SmokeApp

      - name: Service smoke — publish SmokeService
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            RID=win-x64
          else
            RID=linux-x64
          fi
          dotnet publish test/SmokeService -r $RID -o test/smoke-publish/SmokeService

      - name: Service smoke — create companion .sea.json
        shell: bash
        run: echo '{"watch":true}' > test/smoke-publish/SmokeApp/SmokeApp.sea.json

      - name: Service smoke — install
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            test/smoke-publish/SmokeService/SmokeService.exe install
          else
            sudo test/smoke-publish/SmokeService/SmokeService install
          fi

      - name: Service smoke — start
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            test/smoke-publish/SmokeService/SmokeService.exe start
          else
            sudo test/smoke-publish/SmokeService/SmokeService start
          fi

      - name: Service smoke — verify running + reload cycle
        shell: bash
        run: |
          sleep 5
          echo "=== Verify service is running ==="
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            sc.exe query seashell-smoke | grep -i RUNNING
          else
            systemctl is-active seashell-smoke
          fi

          echo "=== Record initial SmokeApp PID ==="
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PID1=$(tasklist | grep SmokeApp | awk '{print $2}')
          else
            PID1=$(pgrep -f 'SmokeApp' | head -1)
          fi
          echo "PID before reload: $PID1"

          echo "=== Wait for first RequestReload (5s + margin) ==="
          sleep 15

          echo "=== Verify SmokeApp reloaded (PID changed) ==="
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PID2=$(tasklist | grep SmokeApp | awk '{print $2}')
          else
            PID2=$(pgrep -f 'SmokeApp' | head -1)
          fi
          echo "PID after reload: $PID2"

          if [[ "$PID1" == "$PID2" ]]; then
            echo "FAIL: SmokeApp PID did not change — reload did not happen"
            exit 1
          fi
          echo "PASS: SmokeApp reloaded (PID $PID1 → $PID2)"

      - name: Service smoke — stop
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            test/smoke-publish/SmokeService/SmokeService.exe stop
            sleep 3
            sc.exe query seashell-smoke | grep -i STOPPED
          else
            sudo test/smoke-publish/SmokeService/SmokeService stop
            sleep 3
            systemctl is-active seashell-smoke && exit 1 || true
          fi

      - name: Service smoke — verify no orphaned processes
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            if tasklist | grep -q SmokeApp; then
              echo "FAIL: SmokeApp process still running after stop"
              taskkill /F /IM SmokeApp.exe
              exit 1
            fi
          else
            if pgrep -f SmokeApp > /dev/null; then
              echo "FAIL: SmokeApp process still running after stop"
              sudo pkill -f SmokeApp
              exit 1
            fi
          fi
          echo "PASS: No orphaned processes"

      - name: Service smoke — uninstall
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            test/smoke-publish/SmokeService/SmokeService.exe uninstall
          else
            sudo test/smoke-publish/SmokeService/SmokeService uninstall
          fi

      # ── Existing lifecycle tests ────────────────────────────────────────
      - name: Lifecycle — status (daemon running after smoke tests)
        run: dotnet run --project src/SeaShell.Cli -- --status

      - name: Lifecycle — stop
        run: dotnet run --project src/SeaShell.Cli -- --stop

      - name: Lifecycle — status after stop
        run: dotnet run --project src/SeaShell.Cli -- --status || true

      - name: Lifecycle — stop when already stopped (idempotent)
        run: dotnet run --project src/SeaShell.Cli -- --stop

      # Upload Linux apphosts for cross-platform NuGet package
      - name: Upload Linux apphosts
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: apphosts-linux
          path: |
            src/SeaShell.Cli/bin/Release/net10.0/seashell-daemon
            src/SeaShell.Cli/bin/Release/net10.0/seashell-elevator

  # Publish to nuget.org on version tags (v*)
  # Packs on Windows (gets .exe apphosts natively from the build),
  # then injects Linux ELF apphosts into the nupkg.
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Pack
        run: dotnet pack -c Release -o ./nupkg

      - name: Download Linux apphosts
        uses: actions/download-artifact@v4
        with:
          name: apphosts-linux
          path: linux-apphosts/

      - name: Inject Linux apphosts into nupkg
        shell: pwsh
        run: |
          $nupkg = (Get-ChildItem nupkg/SeaShell.0.*.nupkg).FullName
          Write-Host "Injecting Linux apphosts into $nupkg"

          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $zip = [System.IO.Compression.ZipFile]::Open($nupkg, 'Update')
          try {
            # Add Linux ELF apphosts
            foreach ($f in Get-ChildItem linux-apphosts/*) {
              $entryName = "tools/net10.0/any/$($f.Name)"
              Write-Host "  Adding $entryName"
              [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile(
                $zip, $f.FullName, $entryName) | Out-Null
            }

            # Patch [Content_Types].xml — add Override entries for extensionless files
            $ctEntry = $zip.GetEntry('[Content_Types].xml')
            $reader = [System.IO.StreamReader]::new($ctEntry.Open())
            $ct = $reader.ReadToEnd()
            $reader.Close()

            foreach ($f in Get-ChildItem linux-apphosts/*) {
              $override = "<Override PartName=`"/tools/net10.0/any/$($f.Name)`" ContentType=`"application/octet`" />"
              if ($ct -notmatch [regex]::Escape($f.Name)) {
                $ct = $ct -replace '</Types>', "  $override`n</Types>"
              }
            }

            # Rewrite [Content_Types].xml
            $ctEntry.Delete()
            $newEntry = $zip.CreateEntry('[Content_Types].xml')
            $writer = [System.IO.StreamWriter]::new($newEntry.Open())
            $writer.Write($ct)
            $writer.Close()
          }
          finally {
            $zip.Dispose()
          }

          # Verify
          $zip = [System.IO.Compression.ZipFile]::OpenRead($nupkg)
          $names = $zip.Entries | ForEach-Object { $_.FullName }
          foreach ($f in @('seashell-daemon', 'seashell-daemon.exe',
                           'seashell-elevator', 'seashell-elevator.exe')) {
            $path = "tools/net10.0/any/$f"
            $status = if ($names -contains $path) { 'OK' } else { 'MISSING' }
            Write-Host "  ${path}: $status"
          }
          $zip.Dispose()

      - name: Push to nuget.org
        shell: pwsh
        run: |
          foreach ($pkg in Get-ChildItem nupkg/*.nupkg) {
            Write-Host "Pushing $($pkg.Name)"
            dotnet nuget push $pkg.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
