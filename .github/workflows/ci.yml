name: Release

on:
  push:
    tags: ['v*']

# ── Job 1: Build ────────────────────────────────────────────────────────
# Compile on all platforms, produce platform-specific binaries.
# sea and seaw are published separately to avoid csproj output conflicts.

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-musl-x64
            container: mcr.microsoft.com/dotnet/sdk:10.0-alpine
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        if: ${{ !matrix.container }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build -c Release

      - name: Publish Daemon + Elevator
        run: |
          dotnet publish src/SeaShell.Daemon/SeaShell.Daemon.csproj -c Release -r ${{ matrix.rid }} --self-contained false -o ./publish/${{ matrix.rid }}
          dotnet publish src/SeaShell.Elevator/SeaShell.Elevator.csproj -c Release -r ${{ matrix.rid }} --self-contained false -o ./publish/${{ matrix.rid }}

      - name: Publish CLI (sea)
        run: |
          dotnet publish src/SeaShell.Cli/SeaShell.Cli.csproj -c Release -r ${{ matrix.rid }} --self-contained false -o ./publish/cli-tmp
        # Merge into main publish dir (sea.* files)
      - name: Merge CLI into publish
        shell: sh
        run: cp -f publish/cli-tmp/* publish/${{ matrix.rid }}/ && rm -rf publish/cli-tmp

      - name: Publish seaw (Windows only)
        if: matrix.rid == 'win-x64'
        run: |
          dotnet publish src/SeaShell.Cli/SeaShell.Cli.csproj -c Release -r win-x64 --self-contained false -p:WindowMode=true -o ./publish/seaw-tmp
        # Merge seaw.* into main publish dir
      - name: Merge seaw into publish
        if: matrix.rid == 'win-x64'
        shell: sh
        run: cp -f publish/seaw-tmp/seaw.* publish/win-x64/ && rm -rf publish/seaw-tmp

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/

  # ── Job 2: Release ───────────────────────────────────────────────────
  # Create archives, embed in bootstrapper, pack, publish, release.

  release:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-win-x64
          path: publish/win-x64/

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-x64
          path: publish/linux-x64/

      - name: Download Alpine binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-musl-x64
          path: publish/linux-musl-x64/

      # Read version from Directory.Build.props
      - name: Get version
        id: version
        shell: pwsh
        run: |
          $props = [xml](Get-Content Directory.Build.props)
          $ver = $props.Project.PropertyGroup.Version
          Write-Host "Version: $ver"
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # Create per-RID zip archives (excluding PDBs and XML docs)
      - name: Create archives
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path src/SeaShell.Bootstrapper/archives | Out-Null

          foreach ($rid in @('win-x64', 'linux-x64', 'linux-musl-x64')) {
            $src = "publish/$rid"
            if (-not (Test-Path $src)) { Write-Host "Skipping $rid"; continue }

            # Filter out PDBs and XML docs
            $files = Get-ChildItem $src -File | Where-Object { $_.Extension -notin '.pdb','.xml' }

            # RID-only archive for embedding in bootstrapper
            $embedZip = "src/SeaShell.Bootstrapper/archives/$rid.zip"
            Compress-Archive -Path $files.FullName -DestinationPath $embedZip -Force
            Write-Host "Embedded: $rid.zip ($($files.Count) files)"

            # Versioned archive for GitHub release
            $releaseZip = "dist/seashell-$version-$rid.zip"
            Copy-Item $embedZip $releaseZip
            Write-Host "Release:  seashell-$version-$rid.zip"
          }

      # Pack Bootstrapper (dotnet tool) + Host (library)
      - name: Pack
        run: dotnet pack -c Release -o ./nupkg

      # Validate packages
      - name: Validate packages
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $failed = $false

          function Assert-Contains($nupkg, $expected) {
            $zip = [System.IO.Compression.ZipFile]::OpenRead($nupkg)
            $entries = $zip.Entries | ForEach-Object { $_.FullName }
            $zip.Dispose()
            foreach ($e in $expected) {
              if ($entries -contains $e) { Write-Host "  OK: $e" }
              else { Write-Host "  MISSING: $e" -ForegroundColor Red; $script:failed = $true }
            }
          }

          Write-Host "=== SeaShell (bootstrapper) ==="
          $pkg = (Get-ChildItem nupkg/SeaShell.0.*.nupkg).FullName
          Assert-Contains $pkg @('tools/net10.0/any/seashell.dll')

          # Check embedded archives (compiled into seashell.dll as EmbeddedResource)
          $tmp = New-TemporaryFile
          $zip = [System.IO.Compression.ZipFile]::OpenRead($pkg)
          $dllEntry = $zip.Entries | Where-Object { $_.FullName -like '*/seashell.dll' } | Select-Object -First 1
          [System.IO.Compression.ZipFileExtensions]::ExtractToFile($dllEntry, $tmp.FullName, $true)
          $zip.Dispose()
          $bytes = [System.IO.File]::ReadAllBytes($tmp.FullName)
          Remove-Item $tmp.FullName -Force
          $asm = [System.Reflection.Assembly]::Load($bytes)
          $archives = ($asm.GetManifestResourceNames() | Where-Object { $_ -like '*.zip' }).Count
          Write-Host "  Embedded archives: $archives"
          if ($archives -lt 3) { Write-Host "  Expected 3 archives" -ForegroundColor Red; $failed = $true }

          Write-Host "`n=== SeaShell.Host ==="
          $pkg = (Get-ChildItem nupkg/SeaShell.Host.*.nupkg).FullName
          Assert-Contains $pkg @(
            'lib/net10.0/SeaShell.Host.dll',
            'build/net10.0/SeaShell.Host.targets',
            'buildTransitive/net10.0/SeaShell.Host.targets'
          )

          # Verify no unexpected packages
          foreach ($pattern in @('SeaShell.Service.*', 'SeaShell.Engine.*', 'SeaShell.Cli.*', 'SeaShell.Invoker.*')) {
            $found = Get-ChildItem "nupkg/$pattern.nupkg" -ErrorAction SilentlyContinue
            if ($found) { Write-Host "UNEXPECTED: $($found.Name)" -ForegroundColor Red; $failed = $true }
          }

          $count = (Get-ChildItem nupkg/*.nupkg).Count
          Write-Host "`nTotal packages: $count"
          if ($failed) { Write-Host "VALIDATION FAILED" -ForegroundColor Red; exit 1 }
          Write-Host "All packages validated OK" -ForegroundColor Green

      - name: Attest NuGet packages
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'nupkg/*.nupkg'

      - name: Push to nuget.org
        if: ${{ !contains(github.ref_name, '-') }}
        shell: pwsh
        run: |
          foreach ($pkg in Get-ChildItem nupkg/*.nupkg) {
            Write-Host "Pushing $($pkg.Name)"
            dotnet nuget push $pkg.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Creating release for $TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            nupkg/*.nupkg \
            dist/seashell-*.zip
